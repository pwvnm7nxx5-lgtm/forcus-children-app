<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3年生 時刻と時間</title>
  <link rel="stylesheet" href="../shared/practice-worksheet.css?v=1">
</head>
<body>
  <div class="app-shell">
    <aside class="controls" aria-label="プリント設定">
      <div class="brand"><h1>3年生 時刻と時間</h1><div class="brand-actions"><a class="home-link" href="../../index.html">入口に戻る</a><span id="pageCount">2枚</span></div></div>
      <div class="row-fields"><label class="field"><span>名前</span><input id="studentName" type="text" autocomplete="off"></label><label class="field"><span>日付</span><input id="worksheetDate" type="text" autocomplete="off" placeholder="7 / 11"></label></div>
      <label class="field"><span>プリント名</span><input id="worksheetTitle" type="text" value="3年生 時刻と時間"></label>
      <div class="settings-grid">
        <label class="field"><span>学習内容</span><select id="problemType"><option value="addition">時間のたし算</option><option value="subtraction">時間のひき算</option><option value="conversion">分と秒の単位変換</option><option value="mixed" selected>ミックス</option></select></label>
        <label class="field"><span>問題数</span><span class="combo-input"><input id="problemCount" type="number" min="1" max="60" value="24"><select id="problemCountPreset" aria-label="問題数の候補"><option value="">候補</option><option value="12">12問</option><option value="18">18問</option><option value="24">24問</option><option value="36">36問</option></select></span></label>
        <label class="field"><span>列数</span><input id="columns" type="number" min="1" max="6" value="3"></label>
      </div>
      <div class="check-row"><label><input id="includeAnswers" type="checkbox" checked> 答えページをつける</label></div>
      <div class="actions"><button id="printBtn" type="button">印刷 / PDF保存</button><button id="regenerateBtn" type="button">作り直す</button><button id="copyLinkBtn" type="button">共有URLをコピー</button></div>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </aside>
    <main class="preview-wrap" aria-label="印刷プレビュー"><div id="pages" class="pages"></div></main>
  </div>
  <template id="pageTemplate"><section class="print-page"><header class="sheet-header"><div class="name-line">なまえ <span class="value" data-name></span></div><div class="title" data-title></div><div class="date-line">ひづけ <span class="value" data-date></span></div><div class="sheet-kind" data-kind></div></header><ol class="problem-grid" data-problems></ol></section></template>
  <script src="app.js?v=1"></script>
  <script src="../shared/practice-worksheet.js?v=1"></script>
  <script src="../shared/print-adjustments.js?v=ctrl-p-shortcut"></script>
</body>
</html>
