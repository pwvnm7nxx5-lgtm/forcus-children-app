<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>4年生 かけ算の筆算</title><link rel="stylesheet" href="../multiplication-print-grade3/styles.css?v=grade4"></head><body>
<div class="app-shell"><aside class="controls"><div class="brand"><h1>4年生 かけ算の筆算</h1><div class="brand-actions"><a class="home-link" href="../../index.html">入口に戻る</a><span id="pageCount">2枚</span></div></div><div class="row-fields"><label class="field"><span>名前</span><input id="studentName" type="text"></label><label class="field"><span>日付</span><input id="worksheetDate" type="text" placeholder="7 / 11"></label></div><label class="field"><span>プリント名</span><input id="worksheetTitle" type="text" value="4年生 かけ算の筆算プリント"></label>
<div class="settings-grid"><label class="field"><span>問題タイプ</span><select id="problemType"><option value="threeByTwo">3けた × 2けた</option><option value="fourByTwo">4けた × 2けた</option><option value="threeByThree">3けた × 3けた</option><option value="mixed">まぜて</option></select></label><label class="field"><span>問題数</span><span class="combo-input"><input id="problemCount" type="number" min="1" max="40" value="12"><select id="problemCountPreset"><option value="">候補</option><option value="8">8問</option><option value="12">12問</option><option value="16">16問</option><option value="24">24問</option></select></span></label><label class="field"><span>列数</span><input id="columns" type="number" min="1" max="6" value="3"></label></div><div class="check-row"><label><input id="showCarryBoxes" type="checkbox" checked> 繰り上がりのマスをつける</label><label><input id="includeAnswers" type="checkbox" checked> 答えページをつける</label></div><div class="actions"><button id="printBtn" type="button">印刷 / PDF保存</button><button id="regenerateBtn" type="button">作り直す</button><button id="copyLinkBtn" type="button">共有URLをコピー</button></div><p id="status" class="status"></p></aside><main class="preview-wrap"><div id="pages" class="pages"></div></main></div>
<template id="pageTemplate"><section class="print-page"><header class="sheet-header"><div class="name-line">なまえ <span class="value" data-name></span></div><div class="title" data-title></div><div class="date-line">ひづけ <span class="value" data-date></span></div><div class="sheet-kind" data-kind></div></header><ol class="problem-grid" data-problems></ol></section></template>
<script src="app.js?v=1"></script><script src="../multiplication-print-grade3/app.js?v=operator-anchor-multiplicand"></script><script src="../shared/print-adjustments.js?v=ctrl-p-shortcut"></script></body></html>
